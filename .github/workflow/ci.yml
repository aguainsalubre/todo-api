name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Rodar lint
        run: npm run lint

      - name: Rodar testes com cobertura
        run: npm test

      - name: Publicar relatório de cobertura como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: test
    # Só builda a imagem se os testes passarem (needs: test)

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build -t todo-api:${{ github.sha }} .

      - name: Smoke test do container
        run: |
          docker run -d -p 3000:3000 --name todo-api-test todo-api:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:3000/health
          docker stop todo-api-test